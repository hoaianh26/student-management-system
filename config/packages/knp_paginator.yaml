knp_paginator:
    page_range: 5                       # number of links showed in the pagination controls (e.g. 1 2 3 4 5)
    default_options:
        page_name: page                 # page query parameter name
        sort_field_name: sort           # sort field query parameter name
        sort_direction_name: direction  # sort direction query parameter name
        distinct: true                  # ensure distinct results, useful when ORM queries are used
        filter_field_name: filterField  # filter field query parameter name
        filter_value_name: filterValue  # filter value query parameter name
    template:
        pagination: '@KnpPaginator/Pagination/bootstrap_v5_pagination.html.twig'     # slides template
        sortable: '@KnpPaginator/Pagination/bootstrap_v5_filtration.html.twig'       # sortable link template
        filtration: '@KnpPaginator/Pagination/bootstrap_v5_filtration.html.twig'     # filtration control template
